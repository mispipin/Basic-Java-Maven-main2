# Workflow build, test, dan deploy Java Maven tanpa Sonar
name: Maven CI/CD Safe

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v2

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean install

      - name: Run Unit Tests
        run: mvn test

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Deploy to Server
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ 192.168.56.1 }}
          username: ${{ LEGION }}
          key: ${{ -----BEGIN OPENSSH PRIVATE KEY----------END OPENSSH PRIVATE KEY----- }}
          port: 22
          script: |
            cd /var/www/app
            mv target/*.jar app.jar
            systemctl restart app.service